<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bayou Fire Pizza</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #050505;
      color: #f4e7c5;
      font-family: Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container {
      padding: 40px;
    }
    .logo {
      width: min(500px, 90%);
      height: auto;
      margin-bottom: 30px;
    }
    h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      margin: 0;
      letter-spacing: 0.08em;
    }
    p {
      font-size: 1.25rem;
      letter-spacing: 0.12em;
      color: #c66a24;
      margin-top: 20px;
    }
    .sub {
      color: #8a8f55;
      font-size: 1rem;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <main class="container">
    <img src="bayou-fire-logo.png" alt="Bayou Fire Logo" class="logo">
    <p>HAND STRETCHED. FIRE FINISHED.</p>
    <div class="sub">Houston's Gulf Coast Pizza Pop-Up</div>
  </main>
</body>
</html>
